server:
  port: ${PORT:8080}

spring:
  application:
    name: niki-bot
  main:
    banner-mode: off
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nikidb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1

telegram:
  delivery-mode: ${TELEGRAM_DELIVERY_MODE:webhook}
  owner:
    id: ${TELEGRAM_OWNER_ID:0}
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:NikiMindBot}
  webhook:
    public-url: ${TELEGRAM_WEBHOOK_URL:${RENDER_EXTERNAL_URL:}}
    path: /telegram/webhook
    secret-token: ${TELEGRAM_WEBHOOK_SECRET:}

llm:
  provider: ${LLM_PROVIDER:claude}
  api:
    key: ${GROQ_API_KEY:${PERPLEXITY_API_KEY:${OPENAI_API_KEY:}}}
    base-url: ${LLM_API_BASE_URL:https://api.groq.com/openai/v1}
    model: ${LLM_MODEL:llama-3.3-70b-versatile}
    fast-model: ${LLM_FAST_MODEL:llama-3.1-8b-instant}
    max-tokens: ${LLM_MAX_TOKENS:700}
    temperature: ${LLM_TEMPERATURE:0.35}
    proactive-max-tokens: ${LLM_PROACTIVE_MAX_TOKENS:220}
  anthropic:
    key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-opus-4-8}
    fast-model: ${CLAUDE_FAST_MODEL:claude-sonnet-4-6}
  vision:
    groq-model: ${LLM_VISION_GROQ_MODEL:llama-3.2-11b-vision-preview}

hh:
  client:
    id: ${HH_CLIENT_ID:}
    secret: ${HH_CLIENT_SECRET:}
  redirect:
    uri: ${HH_REDIRECT_URI:http://localhost:8080/hh/callback}
  user-agent: ${HH_USER_AGENT:NikiBot/2.0 (babaykin35@gmail.com)}
  default-area: ${HH_DEFAULT_AREA:}
  search-per-page: ${HH_SEARCH_PER_PAGE:8}

niki:
  cron-secret: ${NIKI_CRON_SECRET:}
  state-secret: ${NIKI_STATE_SECRET:${HH_CLIENT_SECRET:}}
  morning-cron: "0 0 5 * * *"
  midday-cron: "0 0 11 * * *"
  evening-cron: "0 0 18 * * *"
  job-alert-cron: "0 0 7,15 * * *"

logging:
  level:
    com.niki: INFO
    org.telegram: INFO
