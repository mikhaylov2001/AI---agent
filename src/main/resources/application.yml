server:
  port: ${PORT:8080}

spring:
  application:
    name: niki-bot
  main:
    banner-mode: off
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nikidb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}
  webhook:
    # Render: RENDER_EXTERNAL_URL. Или вручную TELEGRAM_WEBHOOK_BASE_URL=https://ai-agent-fgo1.onrender.com
    base-url: ${TELEGRAM_WEBHOOK_BASE_URL:${RENDER_EXTERNAL_URL:}}
    path: /telegram/webhook

openai:
  api:
    key: ${OPENAI_API_KEY:}
    url: https://api.openai.com/v1/chat/completions
    model: gpt-4o-mini
    max-tokens: 600

hh:
  client:
    id: ${HH_CLIENT_ID:}
    secret: ${HH_CLIENT_SECRET:}
  redirect:
    uri: ${HH_REDIRECT_URI:http://localhost:8080/hh/callback}

niki:
  morning-cron: "0 0 9 * * *"
  evening-cron: "0 0 21 * * *"

logging:
  level:
    com.niki: INFO
    org.telegram: WARN
