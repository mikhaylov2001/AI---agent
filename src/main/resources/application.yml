server:
  port: ${PORT:8080}

spring:
  application:
    name: niki-bot
  main:
    banner-mode: off
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nikidb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

telegram:
  # webhook — для Render (будит сервис при каждом сообщении)
  # polling — локально: TELEGRAM_DELIVERY_MODE=polling
  delivery-mode: ${TELEGRAM_DELIVERY_MODE:webhook}
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:NikiMindBot}
  webhook:
    # Render подставляет RENDER_EXTERNAL_URL; иначе TELEGRAM_WEBHOOK_URL
    public-url: ${TELEGRAM_WEBHOOK_URL:${RENDER_EXTERNAL_URL:}}
    path: /telegram/webhook

llm:
  provider: ${LLM_PROVIDER:groq}
  api:
    key: ${GROQ_API_KEY:${PERPLEXITY_API_KEY:${OPENAI_API_KEY:}}}
    base-url: ${LLM_API_BASE_URL:https://api.groq.com/openai/v1}
    model: ${LLM_MODEL:llama-3.3-70b-versatile}
    max-tokens: ${LLM_MAX_TOKENS:900}

hh:
  client:
    id: ${HH_CLIENT_ID:}
    secret: ${HH_CLIENT_SECRET:}
  redirect:
    uri: ${HH_REDIRECT_URI:http://localhost:8080/hh/callback}

niki:
  # MSK = UTC+3 (Render работает в UTC)
  morning-cron: "0 0 6 * * *"    # 09:00 MSK
  midday-cron: "0 0 11 * * *"    # 14:00 MSK
  evening-cron: "0 0 18 * * *"   # 21:00 MSK
  job-alert-cron: "0 0 7,15 * * *"  # 10:00 и 18:00 MSK

logging:
  level:
    com.niki: INFO
    org.telegram: INFO
