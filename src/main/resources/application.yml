server:
  port: ${PORT:8080}

spring:
  application:
    name: niki-bot
  main:
    banner-mode: off
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nikidb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

telegram:
  # webhook — для Render (будит сервис при каждом сообщении)
  # polling — локально: TELEGRAM_DELIVERY_MODE=polling
  delivery-mode: ${TELEGRAM_DELIVERY_MODE:webhook}
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:NikiMindBot}
  webhook:
    # Render подставляет RENDER_EXTERNAL_URL; иначе TELEGRAM_WEBHOOK_URL
    public-url: ${TELEGRAM_WEBHOOK_URL:${RENDER_EXTERNAL_URL:}}
    path: /telegram/webhook

openai:
  api:
    key: ${OPENAI_API_KEY:}
    # Прямой OpenAI или совместимый прокси (OpenRouter и т.д.)
    base-url: ${OPENAI_API_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_MAX_TOKENS:600}

hh:
  client:
    id: ${HH_CLIENT_ID:}
    secret: ${HH_CLIENT_SECRET:}
  redirect:
    uri: ${HH_REDIRECT_URI:http://localhost:8080/hh/callback}

niki:
  morning-cron: "0 0 9 * * *"
  evening-cron: "0 0 21 * * *"

logging:
  level:
    com.niki: INFO
    org.telegram: INFO
