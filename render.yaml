# Blueprint для Render
services:
  - type: web
    name: niki-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: NikiMindBot
      - key: TELEGRAM_DELIVERY_MODE
        value: webhook
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_OWNER_ID
        sync: false
      - key: LLM_PROVIDER
        value: claude
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_FAST_MODEL
        value: claude-sonnet-4-6
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: HH_CLIENT_ID
        sync: false
      - key: HH_CLIENT_SECRET
        sync: false
      - key: HH_REDIRECT_URI
        sync: false
      - key: HH_USER_AGENT
        sync: false
      - key: NIKI_CRON_SECRET
        sync: false
